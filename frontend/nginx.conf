# Production web server for the FlowForge SPA.
#
# The app calls the API with same-origin paths (fetch('/workflows'), the SSE
# stream at /events, ...), so nginx both serves the static build and reverse-
# proxies those backend routes to the API container. This mirrors the Vite dev
# proxy in frontend/vite.config.ts.

# A browser navigation (hard load / refresh of e.g. /runs/:id) sends
# `Accept: text/html` and must resolve to the SPA (index.html) so the
# client-side route survives — even though /runs/:id is also a real API path.
# The app's own fetch/EventSource calls never send that Accept value, so they
# fall through to the API proxy. Same distinction as the dev-server `bypass`.
map $http_accept $ff_html_nav {
    default 0;
    "~*text/html" 1;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Resolve the API service name via Docker's embedded DNS at request time.
    # Using a variable for the upstream (below) makes nginx defer resolution
    # instead of failing to boot when the API container starts a little later.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Hashed build assets are immutable — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Backend routes: proxy to the API, unless this is a full-page navigation
    # (Accept: text/html), in which case serve the SPA instead.
    location ~ ^/(auth|workflows|runs|hooks|events|health|stats)(/|$) {
        if ($ff_html_nav) {
            rewrite ^ /index.html last;
        }

        set $flowforge_api "http://api:3000";
        proxy_pass $flowforge_api$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Server-Sent Events (/events): stream immediately and hold the
        # connection open instead of buffering the response.
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    # Everything else is a client-side route: fall back to the SPA shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
