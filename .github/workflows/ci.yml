name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  # Detect which part of the monorepo changed so the heavy jobs (tests, builds,
  # image builds) only run for the affected stack. Shared/root files (lockfile,
  # base tsconfig, this workflow) count as changes to BOTH stacks, so anything
  # cross-cutting still rebuilds everything.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.base.json'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.base.json'
              - '.github/workflows/ci.yml'

  # Always runs: whole-repo formatting plus both typechecks are cheap and guard
  # cross-stack consistency (and doc/config-only changes still get linted).
  lint:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      # Prisma enums/types are imported across the backend, so the client must
      # be generated before anything typechecks.
      - run: npm run --workspace=@flowforge/backend prisma:generate
      - name: Prettier (formatting)
        run: npm run format:check
      - name: oxlint (frontend)
        run: npm run --workspace=@flowforge/frontend lint
      - name: Typecheck backend
        run: npm run --workspace=@flowforge/backend typecheck
      - name: Typecheck frontend
        run: npm run --workspace=@flowforge/frontend typecheck

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run --workspace=@flowforge/backend prisma:generate
      - name: Backend tests (Jest)
        run: npm run --workspace=@flowforge/backend test

  e2e:
    name: Integration & E2E tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    # A throwaway Postgres for the API/full-run tests; the suite creates its own
    # `flowforge_test` database inside it and applies migrations before running.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flowforge
          POSTGRES_PASSWORD: flowforge
          POSTGRES_DB: flowforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flowforge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL_TEST: postgresql://flowforge:flowforge@localhost:5432/flowforge_test?schema=public
      JWT_SECRET: ci-e2e-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run --workspace=@flowforge/backend prisma:generate
      - name: Integration & E2E tests (Jest + Postgres)
        run: npm run --workspace=@flowforge/backend test:e2e

  build-backend:
    name: Build backend
    runs-on: ubuntu-latest
    needs: [changes, lint, test, e2e]
    if: needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run --workspace=@flowforge/backend prisma:generate
      - name: Build backend
        run: npm run --workspace=@flowforge/backend build
      - name: Upload backend build
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist
          if-no-files-found: error

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    needs: [changes, lint]
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build frontend
        run: npm run --workspace=@flowforge/frontend build
      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

  docker-backend:
    name: Docker image (backend)
    runs-on: ubuntu-latest
    needs: [changes, build-backend]
    if: needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # Validate the production image builds (no push). GHA layer cache keeps
      # repeat runs fast.
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: flowforge-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  docker-frontend:
    name: Docker image (frontend)
    runs-on: ubuntu-latest
    needs: [changes, build-frontend]
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: false
          tags: flowforge-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
