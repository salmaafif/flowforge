# Local development stack for FlowForge.
# Currently provides PostgreSQL; the API, frontend, and broker services are
# added in the infrastructure step (E).
services:
  db:
    image: postgres:16-alpine
    container_name: flowforge-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: flowforge
      POSTGRES_PASSWORD: flowforge
      POSTGRES_DB: flowforge
    ports:
      # Host 5433 -> container 5432 (5432 is taken by another local Postgres).
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U flowforge -d flowforge']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
